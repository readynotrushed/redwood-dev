<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redwood — Teacher Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: rgb(250, 240, 227);
    --bark: #3d2b1f;
    --bark-light: #6b4c3b;
    --leaf: rgb(121, 21, 22);
    --leaf-light: rgba(121, 21, 22, 0.08);
    --sun: #e8a020;
    --sun-light: #fef3e0;
    --red: #c0392b;
    --red-light: #fdecea;
    --border: #e2d9d0;
    --shadow: rgba(61,43,31,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--bark);
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .login-card {
    background: white;
    border-radius: 20px;
    padding: 3rem 2.5rem;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 8px 40px var(--shadow);
    text-align: center;
  }
  .login-card .tree { font-size: 3rem; margin-bottom: 1rem; }
  .login-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--bark);
    margin-bottom: 0.25rem;
  }
  .login-card p { color: var(--bark-light); font-size: 0.9rem; margin-bottom: 2rem; }
  .login-card input {
    width: 100%;
    padding: 0.9rem 1.2rem;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--bark);
    background: var(--cream);
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: var(--leaf); }
  .login-card button {
    width: 100%;
    padding: 0.9rem;
    background: var(--leaf);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-card button:hover { background: #5a0f10; }
  .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.75rem; display: none; }

  /* MAIN APP */
  #app { display: none; }
  header {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header-left span { font-size: 1.5rem; }
  .header-left h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--bark);
  }
  .header-left small { font-size: 0.75rem; color: var(--bark-light); display: block; }
  .add-btn {
    background: var(--leaf);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.6rem 1.2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-btn:hover { background: #5a0f10; }
  .header-actions { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
  .tz-wrapper { display: flex; align-items: center; gap: 0.4rem; }
  .tz-label { font-size: 0.75rem; color: var(--bark-light); white-space: nowrap; }
  .tz-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--bark);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.6rem;
    background: var(--cream);
    cursor: pointer;
    outline: none;
    max-width: 160px;
  }
  .tz-select:focus { border-color: var(--leaf); }
  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.55rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--bark-light);
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .wa-btn:hover { border-color: #25D366; color: #25D366; background: #f0fdf4; }
  @media (max-width: 500px) { .wa-btn span { display: none; } }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    overflow-x: auto;
    padding-bottom: 0.25rem;
  }
  .day-tab {
    padding: 0.5rem 1.2rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    color: var(--bark-light);
  }
  .day-tab.active {
    background: var(--leaf);
    color: white;
    border-color: var(--leaf);
  }
  .day-tab:hover:not(.active) { border-color: var(--bark-light); color: var(--bark); }

  /* SCHEDULE GRID */
  .schedule { display: flex; flex-direction: column; gap: 0.5rem; }
  .slot-row {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0.75rem;
    align-items: start;
  }
  .slot-time {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--bark-light);
    padding-top: 0.6rem;
    text-align: right;
  }
  .slot-sessions { display: flex; flex-direction: column; gap: 0.4rem; }
  .session-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    transition: box-shadow 0.2s;
    flex-wrap: wrap;
  }
  .session-card:hover { box-shadow: 0 2px 12px var(--shadow); }
  .session-card.is-live { border-color: #e74c3c; box-shadow: 0 0 0 3px rgba(231,76,60,0.08); }
  .session-card.is-past { opacity: 0.5; filter: grayscale(0.4); }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: #e74c3c;
    color: white;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0.15rem 0.5rem;
    border-radius: 20px;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
  .live-dot {
    width: 5px; height: 5px;
    background: white;
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .session-info { flex: 1; }
  .session-teacher { font-weight: 500; font-size: 0.9rem; color: var(--bark); }
  .session-activity { font-size: 0.8rem; color: var(--bark-light); margin-top: 0.1rem; }
  .session-zoom {
    font-size: 0.75rem;
    color: var(--leaf);
    text-decoration: none;
    font-weight: 500;
  }
  .session-zoom:hover { text-decoration: underline; }
  .card-actions { display: flex; gap: 0.4rem; }
  .cancel-btn, .edit-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .cancel-btn { color: var(--red); }
  .cancel-btn:hover { background: var(--red-light); border-color: var(--red); }
  .edit-btn { color: var(--bark-light); }
  .edit-btn:hover { background: var(--sun-light); border-color: var(--sun); color: var(--sun); }
  .empty-slot {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 0.6rem 1rem;
    font-size: 0.8rem;
    color: var(--border);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .empty-slot:hover {
    border-color: var(--leaf);
    color: var(--leaf);
    background: var(--leaf-light);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(61,43,31,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 0.25rem;
  }
  .modal .slot-label {
    font-size: 0.85rem;
    color: var(--bark-light);
    margin-bottom: 1.5rem;
  }
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--bark-light);
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-group select,
  .form-group input {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--bark);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group select:focus,
  .form-group input:focus { border-color: var(--leaf); }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  .btn-primary {
    flex: 1;
    padding: 0.85rem;
    background: var(--leaf);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #5a0f10; }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
  .btn-secondary {
    padding: 0.85rem 1.5rem;
    background: none;
    color: var(--bark-light);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--bark-light); color: var(--bark); }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bark);
    color: white;
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    font-size: 0.9rem;
    transition: transform 0.3s;
    z-index: 300;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--leaf); }
  .toast.error { background: var(--red); }

  .app-body {
    padding: 2rem;
    max-width: 900px;
    margin: 0 auto;
  }

  @media (max-width: 600px) {
    .app-body { padding: 1rem; }
    header { padding: 1rem; }
    .slot-row { grid-template-columns: 60px 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="tree">🌳</div>
    <h1>Redwood Sessions</h1>
    <p>Teacher booking portal</p>
    <input type="password" id="password-input" placeholder="Enter password" />
    <button id="login-btn">Enter</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-left">
      <span>🌳</span>
      <div>
        <h1>Redwood Sessions</h1>
        <small>Teacher Schedule</small>
      </div>
    </div>
    <div class="header-actions">
      <div class="tz-wrapper">
        <span class="tz-label">🕐 Time zone:</span>
        <select class="tz-select" id="tz-select" onchange="onTzChange()">

          <option value="2">Cairo / Athens (GMT+2)</option>
          <option value="3">Moscow (GMT+3)</option>
          <option value="5">Karachi (GMT+5)</option>
          <option value="5.5">Mumbai (GMT+5:30)</option>
          <option value="6">Dhaka (GMT+6)</option>
          <option value="7">Bangkok (GMT+7)</option>
          <option value="8">Singapore (GMT+8)</option>
          <option value="-5">New York (GMT-5)</option>
          <option value="-8">Los Angeles (GMT-8)</option>
        </select>
      </div>
      <a class="wa-btn" href="https://wa.me/447463978471?text=Hi%20Luna%2C%20this%20is%20%5Bname%5D%20I%27m%20having%20an%20issue%20with%20the%20Redwood%20sessions%20page%3A%20" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        <span>Need support?</span>
      </a>
      <button class="add-btn" onclick="openModal()">+ Add session</button>
    </div>
  </header>

  <div class="app-body">
    <div class="schedule-col">
      <div class="day-tabs" id="day-tabs"></div>
      <div class="filter-bar">
        <label style="font-size:0.78rem;color:var(--bark-light);white-space:nowrap;">Filter by teacher:</label>
        <select class="tz-select" id="teacher-filter" onchange="onFilterChange()" style="max-width:200px;">
          <option value="">All teachers</option>
          <option>Ms Ghita</option>
          <option>Ms Nour</option>
          <option>Ms Emy</option>
          <option>Ms Ashley</option>
        </select>
      </div>
      <div class="schedule" id="schedule">
        <div class="loading">Loading sessions…</div>
      </div>
    </div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Book a session</h2>
    <div class="slot-label" id="modal-slot-label">Choose a slot below</div>
    <div class="form-group">
      <label>Your name</label>
      <select id="teacher-select" onchange="selectedTeacher = this.value">
        <option value="">Select teacher…</option>
        <option>Ms Ghita</option>
        <option>Ms Nour</option>
        <option>Ms Emy</option>
        <option>Ms Ashley</option>
      </select>
    </div>
    <div class="form-group">
      <label>Day</label>
      <select id="modal-day-select" onchange="updateModalSlots()">
        <option value="">Select day…</option>
      </select>
    </div>
    <div class="form-group">
      <label>Time slot</label>
      <select id="modal-time-select">
        <option value="">Select time…</option>
      </select>
      <div style="font-size:0.75rem;color:var(--bark-light);margin-top:0.4rem;">🕐 All times are Dubai time (GMT+4)</div>
    </div>
    <div class="form-group">
      <label>Activity <span style="font-weight:300;text-transform:none">(e.g. Songs, Story, Phonics)</span></label>
      <input type="text" id="activity-input" placeholder="What are you planning?" maxlength="60" />
    </div>
    <div class="form-group">
      <label>Zoom link</label>
      <input type="url" id="zoom-input" placeholder="https://zoom.us/j/…" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="submit-btn" onclick="submitSession()">Book slot</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const WORKER_URL = 'https://redwood-api-dev.lunamargherita.com';
  const DUBAI_OFFSET = 4;
  let tzOffset = 4;

  function convertTime(timeStr, fromOffset, toOffset) {
    const [h, m] = timeStr.split(':').map(Number);
    const totalMins = h * 60 + m - (fromOffset * 60) + (toOffset * 60);
    const adjMins = ((totalMins % 1440) + 1440) % 1440;
    const newH = Math.floor(adjMins / 60);
    const newM = adjMins % 60;
    return `${String(newH).padStart(2,'0')}:${String(newM).padStart(2,'0')}`;
  }

  function displayTime(dubaiTime) {
    if (tzOffset === DUBAI_OFFSET) return dubaiTime;
    return convertTime(dubaiTime, DUBAI_OFFSET, tzOffset);
  }

  function onTzChange() {
    tzOffset = parseFloat(document.getElementById('tz-select').value);
    renderSchedule();
  }

  // --- DATES & SLOTS ---
  const CORRECT_DAYS = [
    { label: 'Mon 30 Mar', date: '2026-03-30' },
    { label: 'Tue 31 Mar', date: '2026-03-31' },
    { label: 'Wed 1 Apr', date: '2026-04-01' },
    { label: 'Thu 2 Apr', date: '2026-04-02' },
    { label: 'Fri 3 Apr', date: '2026-04-03' },
  ];

  const MORNING_SLOTS = [];
  for (let h = 9; h <= 13; h++) {
    for (let m = 0; m < 60; m += 15) {
      if (h === 13 && m > 0) break;
      MORNING_SLOTS.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }

  const AFTERNOON_SLOTS = [];
  for (let h = 14; h <= 18; h++) {
    for (let m = 0; m < 60; m += 15) {
      if (h === 18 && m > 0) break;
      AFTERNOON_SLOTS.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }

  const ALL_SLOTS = [...MORNING_SLOTS, ...AFTERNOON_SLOTS];

  // --- STATE ---
  let sessions = [];
  let activeDayIndex = 0;
  let editingSessionId = null;
  let selectedTeacher = '';

  // --- AUTH ---
  let authToken = sessionStorage.getItem('redwood-teacher-token') || null;

  async function checkPassword() {
    const val = document.getElementById('password-input').value;
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Checking…';
    try {
      const res = await fetch(`${WORKER_URL}/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: val, role: 'teacher' }),
      });
      if (res.ok) {
        const data = await res.json();
        authToken = data.token;
        sessionStorage.setItem('redwood-teacher-token', authToken);
        showApp();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    } catch {
      document.getElementById('login-error').textContent = 'Connection error. Try again.';
      document.getElementById('login-error').style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enter';
    }
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` };
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }

  if (authToken) {
    showApp();
  } else {
    document.getElementById('login-btn').addEventListener('click', checkPassword);
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });
    document.getElementById('password-input').focus();
  }

  // --- INIT ---
  function init() {
    buildDayTabs();
    buildModalDayOptions();
    loadSessions();
  }

  function buildDayTabs() {
    const container = document.getElementById('day-tabs');
    CORRECT_DAYS.forEach((day, i) => {
      const btn = document.createElement('button');
      btn.className = 'day-tab' + (i === 0 ? ' active' : '');
      btn.textContent = day.label;
      btn.onclick = () => { activeDayIndex = i; setActiveTab(i); renderSchedule(); };
      container.appendChild(btn);
    });
  }

  function setActiveTab(i) {
    document.querySelectorAll('.day-tab').forEach((t, idx) => {
      t.classList.toggle('active', idx === i);
    });
  }

  function buildModalDayOptions() {
    const sel = document.getElementById('modal-day-select');
    CORRECT_DAYS.forEach((day, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = day.label;
      sel.appendChild(opt);
    });
  }

  // --- LOAD SESSIONS ---
  async function loadSessions() {
    try {
      const res = await fetch(`${WORKER_URL}/sessions`, { headers: authHeaders() });
      sessions = await res.json();
      renderSchedule();
    } catch (e) {
      document.getElementById('schedule').innerHTML = '<div class="loading">Could not load sessions. Check Worker URL.</div>';
    }
  }

  function onFilterChange() {
    selectedTeacher = document.getElementById('teacher-filter').value;
    renderSchedule();
  }

  // --- RENDER SCHEDULE ---
  function renderSchedule() {
    const day = CORRECT_DAYS[activeDayIndex];
    let daySessions = sessions.filter(s => s.date === day.date);
    if (selectedTeacher) {
      daySessions = daySessions.filter(s => s.teacher === selectedTeacher);
    }
    const container = document.getElementById('schedule');

    const byTime = {};
    daySessions.forEach(s => {
      if (!byTime[s.time]) byTime[s.time] = [];
      byTime[s.time].push(s);
    });

    let html = '';
    const tzLabel = tzOffset === DUBAI_OFFSET ? 'Dubai time' : `your local time (GMT${tzOffset >= 0 ? '+' : ''}${tzOffset})`;

    html += `<div style="font-size:0.75rem;font-weight:600;color:var(--bark-light);text-transform:uppercase;letter-spacing:0.08em;padding:0.5rem 0 0.25rem 88px">Morning · ${tzLabel}</div>`;
    MORNING_SLOTS.forEach(slot => {
      html += renderSlotRow(slot, byTime[slot] || [], day.date);
    });

    html += `<div style="font-size:0.75rem;font-weight:600;color:var(--bark-light);text-transform:uppercase;letter-spacing:0.08em;padding:1rem 0 0.25rem 88px">Afternoon · ${tzLabel}</div>`;
    AFTERNOON_SLOTS.forEach(slot => {
      html += renderSlotRow(slot, byTime[slot] || [], day.date);
    });

    container.innerHTML = html;
  }

  function renderSlotRow(slot, slotSessions, date) {
    let sessionsHtml = '';
    slotSessions.forEach(s => {
      const live = isSessionLive(s);
      const past = isSessionPast(s);

      const joinBtn = !past
        ? `<a class="session-zoom" href="${s.zoom_link && !s.zoom_link.startsWith('http') ? 'https://' + s.zoom_link : s.zoom_link}" target="_blank">Start Zoom ↗</a>`
        : '';

      const actions = !past
        ? `<div class="card-actions">
             <button class="edit-btn" onclick="openEditModal('${s.id}')">Edit</button>
             <button class="cancel-btn" onclick="cancelSession('${s.id}')">Cancel</button>
           </div>`
        : '';

      sessionsHtml += `
        <div class="session-card${live ? ' is-live' : ''}${past ? ' is-past' : ''}">
          <div class="session-info">
            <div class="session-teacher">
              ${s.teacher}
              ${live ? '<span class="live-badge"><span class="live-dot"></span>LIVE</span>' : ''}
            </div>
            <div class="session-activity">${s.activity || 'No activity listed'}</div>
          </div>
          ${joinBtn}
          ${actions}
        </div>`;
    });

    sessionsHtml += `<div class="empty-slot" onclick="openModal('${date}','${slot}')">+ Add session</div>`;

    return `
      <div class="slot-row">
        <div class="slot-time">${displayTime(slot)}${slot >= '16:00' ? ' 🌍' : ''}</div>
        <div class="slot-sessions">${sessionsHtml}</div>
      </div>`;
  }

  function isSessionLive(s) {
    const now = new Date();
    const dubaiNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Dubai' }));
    const [year, month, day] = s.date.split('-').map(Number);
    const [h, m] = s.time.split(':').map(Number);
    const sessionStart = new Date(year, month - 1, day, h, m, 0);
    const sessionEnd = new Date(sessionStart.getTime() + 15 * 60 * 1000);
    return dubaiNow >= sessionStart && dubaiNow < sessionEnd;
  }

  function isSessionPast(s) {
    const now = new Date();
    const dubaiNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Dubai' }));
    const [year, month, day] = s.date.split('-').map(Number);
    const [h, m] = s.time.split(':').map(Number);
    const sessionEnd = new Date(year, month - 1, day, h, m + 15, 0);
    return dubaiNow >= sessionEnd;
  }

  // --- MODAL ---
  function openModal(date, time) {
    document.getElementById('modal').classList.add('open');
    if (date && time) {
      const dayIdx = CORRECT_DAYS.findIndex(d => d.date === date);
      if (dayIdx >= 0) {
        document.getElementById('modal-day-select').value = dayIdx;
        updateModalSlots();
        document.getElementById('modal-time-select').value = time;
        document.getElementById('modal-slot-label').textContent =
          `${CORRECT_DAYS[dayIdx].label} at ${time}`;
      }
    } else {
      document.getElementById('modal-day-select').value = activeDayIndex;
      updateModalSlots();
      document.getElementById('modal-slot-label').textContent = 'Choose a slot below';
    }
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('teacher-select').value = '';
    document.getElementById('activity-input').value = '';
    document.getElementById('zoom-input').value = '';
    document.getElementById('modal-time-select').value = '';
    document.getElementById('modal-day-select').value = '';
    document.getElementById('modal-slot-label').textContent = 'Choose a slot below';
    document.getElementById('submit-btn').textContent = 'Book slot';
    document.querySelector('#modal h2').textContent = 'Book a session';
    editingSessionId = null;
  }

  function openEditModal(id) {
    const s = sessions.find(s => s.id === id);
    if (!s) return;
    editingSessionId = id;
    document.getElementById('modal').classList.add('open');
    document.querySelector('#modal h2').textContent = 'Edit session';
    document.getElementById('submit-btn').textContent = 'Save changes';
    document.getElementById('teacher-select').value = s.teacher;
    selectedTeacher = s.teacher;
    const dayIdx = CORRECT_DAYS.findIndex(d => d.date === s.date);
    if (dayIdx >= 0) {
      document.getElementById('modal-day-select').value = dayIdx;
      updateModalSlots();
      document.getElementById('modal-time-select').value = s.time;
      document.getElementById('modal-slot-label').textContent = `Editing: ${CORRECT_DAYS[dayIdx].label} at ${s.time}`;
    }
    document.getElementById('activity-input').value = s.activity || '';
    document.getElementById('zoom-input').value = s.zoom_link || '';
  }

  function updateModalSlots() {
  const sel = document.getElementById('modal-time-select');
  sel.innerHTML = '<option value="">Select time…</option>';
  ALL_SLOTS.forEach(slot => {
    const opt = document.createElement('option');
    opt.value = slot;
    opt.textContent = slot >= '16:00' ? slot + ' 🌍' : slot;
    sel.appendChild(opt);
  });
}

  // --- SUBMIT ---
  async function submitSession() {
    const teacher = document.getElementById('teacher-select').value;
    const dayIdx = document.getElementById('modal-day-select').value;
    const time = document.getElementById('modal-time-select').value;
    const activity = document.getElementById('activity-input').value.trim();
    let zoom_link = document.getElementById('zoom-input').value.trim();
    if (zoom_link && !zoom_link.startsWith('http://') && !zoom_link.startsWith('https://')) {
      zoom_link = 'https://' + zoom_link;
    }

    if (!teacher || dayIdx === '' || !time || !zoom_link) {
      showToast('Please fill in all required fields.', 'error');
      return;
    }

    const date = CORRECT_DAYS[dayIdx].date;
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = editingSessionId ? 'Saving…' : 'Booking…';

    try {
      if (editingSessionId) {
        const res = await fetch(`${WORKER_URL}/session/${editingSessionId}`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ date, time, teacher, activity, zoom_link }),
        });
        if (!res.ok) throw new Error();
        showToast('Session updated!', 'success');
      } else {
        const res = await fetch(`${WORKER_URL}/session`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ date, time, teacher, activity, zoom_link }),
        });
        if (!res.ok) throw new Error();
        showToast('Session booked!', 'success');
      }
      closeModal();
      await loadSessions();
    } catch {
      showToast('Something went wrong. Try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = editingSessionId ? 'Save changes' : 'Book slot';
    }
  }

  // --- CANCEL ---
  async function cancelSession(id) {
    if (!confirm('Cancel this session?')) return;
    try {
      const res = await fetch(`${WORKER_URL}/session/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (!res.ok) throw new Error();
      showToast('Session cancelled.', 'success');
      await loadSessions();
    } catch {
      showToast('Could not cancel. Try again.', 'error');
    }
  }

  // --- TOAST ---
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
